<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>GreenPilot — prototype cliquable</title>
<style>
  :root{
    --pine:#1f5d43; --pineDark:#16432f; --pineLight:#e8f0ea;
    --clay:#c2562f; --clayDark:#9e4222;
    --bg:#f1f5ec; --surface:#fff; --surface2:#eef1e6; --border:#e3e6da; --border2:#d3d8c8;
    --text:#23241f; --text2:#63625a; --text3:#858477;
    --r-sm:8px; --r-md:12px; --r-lg:16px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; justify-content:center; min-height:100vh;
  }
  .phone{
    width:100%; max-width:480px; height:100vh; height:100dvh;
    background:var(--bg); overflow:hidden; position:relative; display:flex; flex-direction:column;
  }
  .ubanner{display:flex; align-items:center; gap:10px; background:var(--pine); color:#fff; padding:9px 12px;}
  .ubanner .ub-txt{flex:1; display:flex; flex-direction:column; line-height:1.25;}
  .ubanner .ub-txt b{font-size:13px; font-weight:600;}
  .ubanner .ub-txt span{font-size:11px; color:rgba(255,255,255,.82);}
  .ubanner .ub-btn{background:#fff; color:var(--pineDark); border:0; border-radius:999px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit;}
  .ubanner .ub-x{background:transparent; border:0; cursor:pointer; display:flex; padding:4px;}
  .scroll{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;}
  .screen{display:none; min-height:100%;}
  .screen.active{display:block;}
  .pad{padding:14px 18px 24px;}
  .row{display:flex; align-items:center;}
  .between{justify-content:space-between;}
  .icon-btn{width:44px; height:44px; border-radius:22px; border:1px solid var(--border); background:var(--surface); display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 1px 2px rgba(0,0,0,.04); transition:background .15s, transform .1s;}
  .icon-btn:active{transform:scale(.92);}
  svg{display:block;}
  .h-sub{font-size:11px; color:var(--text3); font-weight:600; text-transform:uppercase; letter-spacing:.6px;}
  .h-title{font-size:22px; font-weight:700; color:var(--text); margin:0; letter-spacing:-.3px;}
  .muted{font-size:13px; font-weight:600; color:var(--text2);}
  .count-chip{background:var(--pineLight); color:var(--pineDark); font-size:12px; font-weight:700; border-radius:999px; padding:3px 11px;}
  /* week strip */
  .week{display:flex; gap:6px; margin:14px 0 18px;}
  .day{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:9px 0 7px; border-radius:14px; cursor:pointer; background:transparent; transition:background .15s, transform .1s;}
  .day:active{transform:scale(.95);}
  .day.sel{background:var(--pine); box-shadow:0 6px 14px rgba(31,93,67,.28);}
  .day .wd{font-size:10px; letter-spacing:.6px; text-transform:uppercase; color:var(--text3); font-weight:600;}
  .day.sel .wd{color:rgba(255,255,255,.85);}
  .day.today:not(.sel) .wd{color:var(--pine);}
  .day .dn{font-size:17px; font-weight:600; color:var(--text);}
  .day.sel .dn{color:#fff;}
  .day.today:not(.sel) .dn{color:var(--pine); font-weight:700;}
  .dot{width:5px;height:5px;border-radius:3px;background:transparent;}
  /* appt card */
  .appt{display:flex; gap:12px; margin-bottom:11px;}
  .appt .time{width:46px; padding-top:13px; text-align:right; font-size:13px; font-weight:600; color:var(--text2);}
  .card{flex:1; display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-left-width:4px; border-top-right-radius:var(--r-md); border-bottom-right-radius:var(--r-md); padding:13px 14px; cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.06); transition:box-shadow .15s, transform .1s;}
  .card:active{transform:scale(.99);}
  .card .name{font-size:15px; font-weight:600;}
  .card .addr{font-size:12px; color:var(--text2); margin-top:2px;}
  .pill{border-radius:999px; padding:5px 11px; font-size:12px; font-weight:600; white-space:nowrap; display:inline-flex; align-items:center; gap:4px;}
  .empty{display:flex; flex-direction:column; align-items:center; padding:48px 0; color:var(--text3); gap:8px; font-size:13px;}
  /* task */
  .task{display:flex; align-items:center; gap:9px; border-radius:var(--r-md); padding:11px; margin-bottom:0; cursor:pointer;}
  .task .lbl{font-size:14px; color:var(--text);}
  .task .qty{font-size:12px; color:var(--text2); margin-top:1px;}
  .task .st{font-size:12px; font-weight:600;}
  .strike{text-decoration:line-through;}
  .task-del{margin-left:6px; background:transparent; border:0; cursor:pointer; padding:4px; display:flex; border-radius:8px; transition:transform .1s;}
  .task-del:active{transform:scale(.85);}
  .add-task{display:flex; align-items:center; gap:8px; margin-top:4px;}
  .add-task input{flex:1; height:48px; border:1.5px dashed var(--border2); border-radius:var(--r-md); background:transparent; padding:0 14px; font-size:14px; color:var(--text); font-family:inherit; outline:0; transition:border-color .15s;}
  .add-task input::placeholder{color:var(--text3);}
  .add-task input:focus{border-color:var(--pine); border-style:solid;}
  .add-task .add-btn{width:48px; height:48px; flex:none; border-radius:var(--r-md); background:var(--pine); color:#fff; border:0; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(31,93,67,.28);}
  /* generic */
  .btn-primary{height:52px; border-radius:var(--r-md); background:var(--pine); color:#fff; font-size:16px; font-weight:600; border:0; width:100%; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 16px rgba(31,93,67,.28); transition:transform .1s;}
  .btn-clay{height:50px; border-radius:var(--r-md); background:var(--clay); color:#fff; font-size:15px; font-weight:600; border:0; width:100%; cursor:pointer; box-shadow:0 6px 16px rgba(194,86,47,.28); transition:transform .1s;}
  .btn-primary:active,.btn-clay:active{transform:scale(.985);}
  .field{display:flex; align-items:center; gap:10px; border:1px solid var(--border); border-radius:var(--r-md); padding:0 13px; height:52px; background:var(--surface); margin-bottom:10px;}
  .field input{flex:1; border:0; outline:0; background:transparent; font-size:15px; color:var(--text); font-family:inherit;}
  .field input::placeholder{color:var(--text3);}
  .field{transition:border-color .15s, box-shadow .15s;}
  .field:focus-within{border-color:var(--pine); box-shadow:0 0 0 3px rgba(31,93,67,.12);}
  .link{color:var(--pine); font-size:14px; font-weight:600; cursor:pointer;}
  .center{display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
  .presta-wrap{border:1px solid var(--border); border-radius:var(--r-md); margin-bottom:7px; overflow:hidden;}
  .presta-wrap.on{background:var(--surface2); border-color:var(--border2);}
  .presta-head{display:flex; align-items:center; gap:11px; padding:11px; cursor:pointer;}
  .presta-head .pl{font-size:14px; color:var(--text2);}
  .presta-wrap.on .presta-head .pl{color:var(--text);}
  .presta-detail{padding:0 11px 11px 44px;}
  .presta-detail .opt{font-size:11px; color:var(--text3); margin:0 0 5px 2px;}
  .presta-detail input{width:100%; height:40px; border:1px solid var(--border2); border-radius:var(--r-sm); background:var(--surface); padding:0 11px; font-size:13px; color:var(--text); font-family:inherit; outline:0;}
  .presta-detail input::placeholder{color:var(--text3);}
  .set-row{display:flex; align-items:center; gap:12px; padding:14px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md); margin-bottom:8px;}
  .set-row .sl{flex:1; font-size:14px;}
  /* tab bar */
  .tabbar{background:#d4e7c9; border-top:1px solid #bfd6ad; display:none; box-shadow:0 -3px 14px rgba(31,93,67,.1);}
  .tabbar.show{display:block;}
  .tabs{display:flex; height:64px; align-items:flex-start;}
  .tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding-top:8px; cursor:pointer; color:var(--text2); font-size:11px; font-weight:500; background:none; border:0; font-family:inherit;}
  .tab.active{color:var(--pine);}
  .tab .tab-ic{width:48px; height:30px; border-radius:15px; display:flex; align-items:center; justify-content:center; transition:background .15s;}
  .tab.active .tab-ic{background:#aed09c;}
  .fab-slot{width:72px; position:relative; display:flex; flex-direction:column; align-items:center;}
  .fab{position:absolute; top:-24px; width:62px; height:62px; border-radius:31px; background:var(--clay); display:flex; align-items:center; justify-content:center; cursor:pointer; border:4px solid #d4e7c9; box-shadow:0 8px 18px rgba(194,86,47,.45); transition:transform .1s;}
  .fab:active{transform:scale(.94);}
  .fab-lbl{font-size:11px; color:var(--text2); font-weight:500; margin-top:44px;}
  /* modal */
  .modal{position:absolute; inset:0; background:var(--bg); display:none; flex-direction:column; z-index:20;}
  .modal.show{display:flex;}
  .modal .scroll{padding:0;}
  .voice{height:58px; border-radius:var(--r-lg); background:var(--pineLight); display:flex; align-items:center; justify-content:center; gap:10px; color:var(--pineDark); font-size:15px; font-weight:600; cursor:pointer; margin-bottom:8px;}
  .brand-badge{width:64px;height:64px;border-radius:var(--r-lg);background:var(--pine);display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
  /* grille agenda (planning semaine) */
  .grid-wrap{overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -18px; padding:2px 18px 10px;}
  .grid{display:grid; grid-template-columns:68px repeat(7, 92px); gap:6px; min-width:max-content;}
  .gh{text-align:center; padding:7px 0; border-radius:12px;}
  .gh .wd{font-size:11px; letter-spacing:.5px; color:var(--text2); font-weight:700;}
  .gh .dn{font-size:16px; font-weight:700; color:var(--text); margin-top:1px;}
  .gh.today{background:var(--pine);}
  .gh.today .wd,.gh.today .dn{color:#fff;}
  .glabel{display:flex; flex-direction:column; justify-content:center; padding:0 2px;}
  .glabel b{font-size:13px; color:var(--text); font-weight:600;}
  .glabel span{font-size:11px; color:var(--text2); margin-top:2px;}
  .gcell{min-height:76px; border:1px solid var(--border); border-radius:14px; background:var(--surface); display:flex; flex-direction:column; gap:5px; padding:6px;}
  .gcell.empty{border:0; background:repeating-linear-gradient(45deg,#e6ecdd,#e6ecdd 5px,#f1f5ec 5px,#f1f5ec 11px); align-items:center; justify-content:center; cursor:pointer;}
  .gcell.empty .plus{color:var(--text3); font-size:22px; font-weight:300; line-height:1;}
  .gchip{border-radius:10px; padding:8px 9px; font-size:12.5px; font-weight:600; display:flex; flex-direction:column; align-items:flex-start; gap:1px; cursor:grab; border:1.5px solid; line-height:1.15; transition:transform .1s; touch-action:none; user-select:none;}
  .gchip .gtime{font-size:10px; font-weight:700; opacity:.8;}
  .gchip .gname{font-size:12.5px; max-width:100%;}
  .gchip:active{transform:scale(.96);}
  .gchip .gdot{width:7px; height:7px; border-radius:4px; flex:none;}
  .gchip .gname{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  /* bascule Jour/Semaine + vue Jour */
  .seg{display:flex; background:var(--surface2); border-radius:999px; padding:4px; gap:4px;}
  .seg button{flex:1; height:38px; border:0; border-radius:999px; background:transparent; font-size:14px; font-weight:600; color:var(--text2); cursor:pointer; font-family:inherit; transition:background .12s;}
  .seg button.on{background:var(--pine); color:#fff;}
  .seg.seg-sm{padding:3px; gap:3px;}
  .seg.seg-sm button{height:38px; font-size:13px;}
  .band-hdr{display:flex; align-items:baseline; gap:8px; margin:16px 0 9px;}
  .band-hdr span:first-child{font-size:14px; font-weight:700; color:var(--text);}
  .band-hdr .band-time{font-size:12px; color:var(--text3);}
  .empty-band{display:flex; align-items:center; justify-content:center; gap:6px; height:50px; border:1.5px dashed var(--border2); border-radius:var(--r-md); color:var(--text3); font-size:13px; font-weight:600; cursor:pointer; margin-bottom:11px; transition:transform .1s;}
  .empty-band:active{transform:scale(.99);}
  /* voix — pari produit */
  .voice-cta{display:flex; align-items:center; gap:12px; width:100%; background:var(--pine); color:#fff; border:0; border-radius:var(--r-lg); padding:14px 16px; cursor:pointer; font-family:inherit; margin-bottom:12px; box-shadow:0 6px 16px rgba(31,93,67,.28); text-align:left;}
  .voice-cta .vc-ic{width:44px; height:44px; border-radius:22px; background:var(--clay); display:flex; align-items:center; justify-content:center; flex:none;}
  .voice-cta .vc-txt{flex:1; display:flex; flex-direction:column; line-height:1.25;}
  .voice-cta .vc-txt b{font-size:15px; font-weight:700;}
  .voice-cta .vc-txt span{font-size:12px; color:rgba(255,255,255,.82);}
  .voice-cta:active{transform:scale(.99);}
  .vsheet{position:absolute; inset:0; background:rgba(20,20,18,.45); display:none; align-items:flex-end; z-index:50;}
  .vsheet.show{display:flex;}
  .vsheet .vbody{background:var(--surface); width:100%; border-top-left-radius:20px; border-top-right-radius:20px; padding:22px 18px 24px; box-shadow:0 -8px 30px rgba(0,0,0,.22);}
  @keyframes vpulse{0%{box-shadow:0 0 0 0 rgba(31,93,67,.35);}70%{box-shadow:0 0 0 22px rgba(31,93,67,0);}100%{box-shadow:0 0 0 0 rgba(31,93,67,0);}}
  .vmic{width:92px; height:92px; border-radius:50%; background:var(--pine); display:flex; align-items:center; justify-content:center; animation:vpulse 1.6s infinite;}
  .vitem{display:flex; align-items:center; gap:11px; padding:12px; border:1px solid var(--border); border-radius:var(--r-md); margin-bottom:8px; cursor:pointer;}
  .vitem.on{background:var(--pineLight); border-color:var(--border2);}
  .vitem .vil{flex:1; font-size:14px; color:var(--text);}
  /* interrupteurs, unités, plans */
  .switch{width:50px; height:30px; border-radius:999px; background:var(--border2); position:relative; cursor:pointer; transition:background .15s; flex:none;}
  .switch.on{background:var(--pine);}
  .switch .knob{position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:12px; background:#fff; transition:left .15s; box-shadow:0 1px 2px rgba(0,0,0,.2);}
  .switch.on .knob{left:23px;}
  .unit-chip{font-size:11px; color:var(--text2); background:var(--surface2); border-radius:999px; padding:2px 9px; font-weight:600;}
  .sub-head{display:flex; align-items:center; gap:6px; background:var(--pineLight); border-radius:var(--r-md); padding:8px 10px; margin-bottom:14px;}
  .back-btn{width:44px; height:44px; border-radius:10px; border:0; background:transparent; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform .1s;}
  .back-btn:active{transform:scale(.9);}
  .wk-nav{width:44px; height:44px; border-radius:10px; border:0; background:transparent; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform .1s;}
  .wk-nav:active{transform:scale(.88);}
  .carte-filter{display:flex; align-items:center; gap:8px; margin-bottom:12px;}
  .carte-filter .dt-input{height:42px;}
  .carte-filter .cf-clear{height:42px; padding:0 12px; border-radius:var(--r-md); border:1px solid var(--border2); background:var(--surface); font-size:13px; font-weight:600; color:var(--text2); cursor:pointer; font-family:inherit; white-space:nowrap;}
  .plan{border:1px solid var(--border); border-radius:var(--r-lg); padding:15px; margin-bottom:10px; background:var(--surface);}
  .plan.cur{border:2px solid var(--pine);}
  .plan .pname{font-size:16px; font-weight:700;}
  .plan .pprice{font-size:15px; font-weight:700; color:var(--pine);}
  .plan .pdesc{font-size:12px; color:var(--text2); margin-top:4px;}
  .plan .pbadge{font-size:11px; font-weight:700; color:var(--pineDark); background:var(--pineLight); border-radius:999px; padding:3px 10px;}
  .plan .pbtn{margin-top:11px; height:40px; border-radius:var(--r-md); border:1px solid var(--pine); background:transparent; color:var(--pine); font-weight:600; font-size:13px; width:100%; cursor:pointer; font-family:inherit;}
  /* glisser-déposer + confirmation */
  .gcell.drop{outline:2px dashed var(--pine); outline-offset:-2px; background:var(--pineLight);}
  .confirm{position:absolute; inset:0; background:rgba(20,20,18,.4); display:none; align-items:flex-end; z-index:40;}
  .confirm.show{display:flex;}
  .confirm .sheet{background:var(--surface); width:100%; border-top-left-radius:20px; border-top-right-radius:20px; padding:18px 18px 22px; box-shadow:0 -8px 30px rgba(0,0,0,.22);}
  .cf-cancel{flex:1; height:46px; border-radius:var(--r-md); border:1px solid var(--border2); background:transparent; color:var(--text2); font-weight:600; font-size:14px; cursor:pointer; font-family:inherit;}
  .cf-ok{flex:1; height:46px; border-radius:var(--r-md); border:0; background:var(--pine); color:#fff; font-weight:600; font-size:14px; cursor:pointer; font-family:inherit;}
  /* barre de défilement soignée */
  .scroll{scrollbar-width:thin; scrollbar-color:#c2cfb6 transparent;}
  .scroll::-webkit-scrollbar{width:7px;}
  .scroll::-webkit-scrollbar-track{background:transparent;}
  .scroll::-webkit-scrollbar-thumb{background:#c8d3bd; border-radius:8px; border:2px solid transparent; background-clip:padding-box;}
  .scroll::-webkit-scrollbar-thumb:hover{background:#b2c2a1;}
  .grid-wrap::-webkit-scrollbar{height:8px;}
  .grid-wrap::-webkit-scrollbar-thumb{background:#c8d3bd; border-radius:8px;}
  /* bandeau de filtres roulant */
  .filters{display:flex; gap:8px; overflow-x:auto; margin:0 -18px 12px; padding:2px 18px 6px; scrollbar-width:none;}
  .filters::-webkit-scrollbar{display:none;}
  .fchip{flex:none; min-height:40px; padding:9px 15px; border-radius:999px; border:1px solid var(--border2); background:var(--surface); font-size:13px; font-weight:600; color:var(--text2); cursor:pointer; white-space:nowrap; transition:all .12s;}
  .fchip.on{background:var(--pine); border-color:var(--pine); color:#fff;}
  /* rapport de chantier */
  .pbar{height:8px; border-radius:999px; background:var(--surface2); overflow:hidden;}
  .pbar>span{display:block; height:100%; background:var(--pine); border-radius:999px;}
  .rep-head{background:var(--pine); color:#fff; border-radius:var(--r-lg); padding:16px; margin-bottom:16px;}
  .rep-photos{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .rep-photo{aspect-ratio:4/3; border:1.5px dashed var(--border2); border-radius:var(--r-md); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; color:var(--text3); font-size:12px; font-weight:600; background:var(--surface);}
  .rep-btn{height:50px; border-radius:var(--r-md); border:0; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:8px;}
  /* commentaires de tâche, observations, devis */
  .taskwrap{margin-bottom:8px;}
  .task-ic{background:transparent; border:0; cursor:pointer; padding:8px; display:flex; border-radius:8px; transition:transform .1s;}
  .task-ic:active{transform:scale(.85);}
  .note-btn{display:flex; align-items:center; gap:5px; min-height:36px; font-size:12px; font-weight:600; color:var(--text2); background:var(--surface2); border:0; border-radius:999px; padding:7px 12px; cursor:pointer; font-family:inherit; white-space:nowrap; transition:transform .1s;}
  .note-btn.has{background:var(--pineLight); color:var(--pineDark);}
  .note-btn:active{transform:scale(.92);}
  /* autocomplétion d'adresse */
  .addr-suggest{border:1px solid var(--border2); border-radius:var(--r-md); background:var(--surface); margin:-4px 0 10px; overflow:hidden; box-shadow:0 6px 16px rgba(0,0,0,.08);}
  .addr-suggest:empty{display:none;}
  .addr-head{display:flex; align-items:center; gap:6px; font-size:11px; font-weight:700; color:var(--pine); padding:8px 12px 4px; text-transform:uppercase; letter-spacing:.4px;}
  .addr-item{display:flex; align-items:center; gap:8px; padding:10px 12px; font-size:14px; color:var(--text); cursor:pointer; border-top:1px solid var(--border);}
  .addr-item:first-child{border-top:0;}
  .addr-item:active{background:var(--surface2);}
  /* éditeur date / créneau */
  .sched{margin:0 0 16px;}
  .sched-lbl{font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px;}
  .dt-input{flex:1; height:46px; border:1px solid var(--border2); border-radius:var(--r-md); background:var(--surface); padding:0 12px; font-size:14px; font-family:inherit; color:var(--text); outline:0;}
  .band-sel{flex:none; height:46px; border:1px solid var(--border2); border-radius:var(--r-md); background:var(--surface); padding:0 10px; font-size:14px; font-family:inherit; color:var(--text); outline:0; cursor:pointer;}
  .dt-input:focus, .band-sel:focus{border-color:var(--pine);}
  .tasknote{font-size:12px; color:var(--text2); font-style:italic; padding:6px 12px 0 46px;}
  .tasknote-edit{padding:7px 12px 0 46px;}

var APP_VERSION='2.3';
function showBanner(newV){
  var b=document.getElementById('ubanner'); if(!b) return;
  b.style.display='flex';
  b.innerHTML='<span style="display:flex">'+icon('download',18,'#fff')+'</span>'+
    '<div class="ub-txt"><b>Mise à jour disponible</b><span>Nouvelles améliorations — v'+newV+'</span></div>'+
    '<button class="ub-btn" onclick="updateApp()">Mettre à jour</button>'+
    '<button class="ub-x" aria-label="Plus tard" onclick="dismissBanner(\''+newV+'\')">'+icon('x',16,'rgba(255,255,255,.85)')+'</button>';
}
function checkUpdate(){
  var b=document.getElementById('ubanner'); if(!b) return;
  fetch('version.json?t='+Date.now()).then(function(r){return r.json();}).then(function(v){
    if(!v||!v.version) return;
    var skip=''; try{ skip=sessionStorage.getItem('gp_skip')||''; }catch(e){}
    if(v.version!==APP_VERSION && skip!==v.version){ showBanner(v.version); }
    else { b.style.display='none'; }
  }).catch(function(){ /* fichier local / hors-ligne : pas de bandeau */ });
}
function renderBanner(){ var b=document.getElementById('ubanner'); if(b) b.style.display='none'; checkUpdate(); setInterval(checkUpdate, 60000); }

function cellAt(x,y){ var el=document.elementFromPoint(x,y); return el?el.closest('.gcell'):null; }
function clearHighlight(){ var p=document.querySelector('.gcell.drop'); if(p) p.classList.remove('drop'); }
function chipDown(e, id, day){
  e.preventDefault();
  var chip=e.currentTarget, sx=e.clientX, sy=e.clientY, moved=false, ghost=null;
  function move(ev){
    if(!moved && (Math.abs(ev.clientX-sx)+Math.abs(ev.clientY-sy))>8){
      moved=true;
      ghost=chip.cloneNode(true);
      Object.assign(ghost.style,{position:'fixed',pointerEvents:'none',zIndex:'90',opacity:'.92',margin:'0',width:chip.offsetWidth+'px',boxShadow:'0 10px 22px rgba(0,0,0,.28)'});
      document.body.appendChild(ghost); chip.style.opacity='.35'; document.body.style.userSelect='none';
    }
    if(moved){ ev.preventDefault(); ghost.style.left=(ev.clientX-ghost.offsetWidth/2)+'px'; ghost.style.top=(ev.clientY-18)+'px'; clearHighlight(); var c=cellAt(ev.clientX,ev.clientY); if(c) c.classList.add('drop'); }
  }
  function up(ev){
    document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up);
    document.body.style.userSelect=''; clearHighlight();
    if(!moved){ openChantier(id); return; }
    if(ghost) ghost.remove(); chip.style.opacity='';
    var cell=cellAt(ev.clientX,ev.clientY);
    if(cell){ var toIso=cell.getAttribute('data-date'), toBand=cell.getAttribute('data-band'); var ch=chantierById(id);
      if(ch && toIso && (toIso!==day || bandOf(ch.time)!==toBand)){ askMove(id, day, toIso, toBand); } }
  }
  document.addEventListener('pointermove',move,{passive:false});
  document.addEventListener('pointerup',up);
}
function dayLabel(iso){ return fmtDate(iso); }
function bandLabel(k){ for(var i=0;i<BANDS.length;i++){ if(BANDS[i].key===k) return BANDS[i].label; } return k; }
function bandTime(k){ return k==='matin'?'09:00':(k==='aprem'?'14:00':'18:00'); }
function askMove(id, fromDay, toDay, toBand){
  var ch=chantierById(id); if(!ch) return;
  var from=dayLabel(fromDay)+' · '+bandLabel(bandOf(ch.time));
  var to=dayLabel(toDay)+' · '+bandLabel(toBand);
  showConfirm('Déplacer le chantier ?', '<b>'+ch.name+'</b><br><span style="color:var(--text3)">'+from+'</span> &nbsp;→&nbsp; <b style="color:var(--pine)">'+to+'</b>', 'Déplacer', function(){ moveChantier(id, fromDay, toDay, toBand); });
}
function moveChantier(id, fromIso, toIso, toBand){
  var ch=chantierById(id); if(!ch) return;
  if(CH[fromIso]) CH[fromIso]=CH[fromIso].filter(function(c){return c.id!==id;});
  ch.time=bandTime(toBand);
  if(!CH[toIso]) CH[toIso]=[];
  CH[toIso].push(ch);
  render();
}

    state.presta.map(function(p,i){
      var head='<div class="presta-head" onclick="togglePresta('+i+')">'+icon(p.on?'checkbox':'square',22,p.on?STATUS.done.fg:'var(--text3)')+'<span class="pl">'+p.n+'</span></div>';
      var detail = p.on ? '<div class="presta-detail"><div class="opt">Détail (facultatif)</div><input inputmode="numeric" placeholder="'+p.hint+'" value="'+(p.detail||'').replace(/"/g,'&quot;')+'" oninput="setDetail('+i+',this.value)"/></div>' : '';
      return '<div class="presta-wrap'+(p.on?' on':'')+'">'+head+detail+'</div>';
    }).join('')+
    '<button class="btn-clay" style="margin-top:14px" onclick="createChantier()">Créer le chantier</button>'+
    '</div>';
  document.getElementById('modal-body').innerHTML=body;
}

function renderTabbar(){
  var tb=document.getElementById('tabbar');
  if(TAB_SCREENS.indexOf(state.screen)===-1){ tb.classList.remove('show'); tb.innerHTML=''; return; }
  tb.classList.add('show');
  var defs=[['agenda','calendar','Agenda'],['chantiers','clip','Mes chantiers']];
  var right=[['carte','map','Carte'],['profil','user','Profil']];
  function tab(t){ var act=state.screen===t[0]; return '<button class="tab'+(act?' active':'')+'" onclick="go(\''+t[0]+'\')"><span class="tab-ic">'+icon(t[1],22,act?'var(--pine)':'var(--text2)')+'</span><span>'+t[2]+'</span></button>'; }
  tb.innerHTML='<div class="tabs">'+defs.map(tab).join('')+
    '<div class="fab-slot"><div class="fab" onclick="openCreate()">'+icon('plus',30,'#fff')+'</div><div class="fab-lbl">Créer</div></div>'+
    right.map(tab).join('')+'</div>';
}

var VIEWS={connexion:viewConnexion,inscription:viewInscription,agenda:viewAgenda,mois:viewMois,fiche:viewFiche,chantiers:viewChantiers,carte:viewCarte,profil:viewProfil,prestations:viewPrestations,abonnement:viewAbonnement,rappels:viewRappels,rapport:viewRapport,devis:viewDevis};
function render(){
  document.getElementById('app').innerHTML='<div class="screen active">'+(VIEWS[state.screen]||viewAgenda)()+'</div>';
  renderTabbar();
  if(state.screen==='agenda' && state.agendaView==='semaine'){ var gw=document.querySelector('.grid-wrap'), t=document.querySelector('.gh.today'); if(gw&&t){ gw.scrollLeft=Math.max(0, t.offsetLeft-94); } }
}
render();
renderBanner();
</script>
</body>
</html>
