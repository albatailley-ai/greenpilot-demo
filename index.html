<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>GreenPilot — prototype cliquable</title>
<style>
  :root{
    --pine:#1f5d43; --pineDark:#16432f; --pineLight:#e8f0ea;
    --clay:#c2562f; --clayDark:#9e4222;
    --bg:#f1f5ec; --surface:#fff; --surface2:#eef1e6; --border:#e3e6da; --border2:#d3d8c8;
    --text:#23241f; --text2:#6c6b61; --text3:#9c9a8e;
    --r-sm:8px; --r-md:12px; --r-lg:16px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; justify-content:center; min-height:100vh;
  }
  .phone{
    width:100%; max-width:480px; height:100vh; height:100dvh;
    background:var(--bg); overflow:hidden; position:relative; display:flex; flex-direction:column;
  }
  .ubanner{display:flex; align-items:center; gap:10px; background:var(--pine); color:#fff; padding:9px 12px;}
  .ubanner .ub-txt{flex:1; display:flex; flex-direction:column; line-height:1.25;}
  .ubanner .ub-txt b{font-size:13px; font-weight:600;}
  .ubanner .ub-txt span{font-size:11px; color:rgba(255,255,255,.82);}
  .ubanner .ub-btn{background:#fff; color:var(--pineDark); border:0; border-radius:999px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit;}
  .ubanner .ub-x{background:transparent; border:0; cursor:pointer; display:flex; padding:4px;}
  .scroll{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;}
  .screen{display:none; min-height:100%;}
  .screen.active{display:block;}
  .pad{padding:14px 18px 24px;}
  .row{display:flex; align-items:center;}
  .between{justify-content:space-between;}
  .icon-btn{width:40px; height:40px; border-radius:20px; border:1px solid var(--border); background:var(--surface); display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 1px 2px rgba(0,0,0,.04); transition:background .15s, transform .1s;}
  .icon-btn:active{transform:scale(.92);}
  svg{display:block;}
  .h-sub{font-size:11px; color:var(--text3); font-weight:600; text-transform:uppercase; letter-spacing:.6px;}
  .h-title{font-size:22px; font-weight:700; color:var(--text); margin:0; letter-spacing:-.3px;}
  .muted{font-size:13px; font-weight:600; color:var(--text2);}
  .count-chip{background:var(--pineLight); color:var(--pineDark); font-size:12px; font-weight:700; border-radius:999px; padding:3px 11px;}
  /* week strip */
  .week{display:flex; gap:6px; margin:14px 0 18px;}
  .day{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:9px 0 7px; border-radius:14px; cursor:pointer; background:transparent; transition:background .15s, transform .1s;}
  .day:active{transform:scale(.95);}
  .day.sel{background:var(--pine); box-shadow:0 6px 14px rgba(31,93,67,.28);}
  .day .wd{font-size:10px; letter-spacing:.6px; text-transform:uppercase; color:var(--text3); font-weight:600;}
  .day.sel .wd{color:rgba(255,255,255,.85);}
  .day.today:not(.sel) .wd{color:var(--pine);}
  .day .dn{font-size:17px; font-weight:600; color:var(--text);}
  .day.sel .dn{color:#fff;}
  .day.today:not(.sel) .dn{color:var(--pine); font-weight:700;}
  .dot{width:5px;height:5px;border-radius:3px;background:transparent;}
  /* appt card */
  .appt{display:flex; gap:12px; margin-bottom:11px;}
  .appt .time{width:46px; padding-top:13px; text-align:right; font-size:13px; font-weight:600; color:var(--text2);}
  .card{flex:1; display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-left-width:4px; border-top-right-radius:var(--r-md); border-bottom-right-radius:var(--r-md); padding:13px 14px; cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.06); transition:box-shadow .15s, transform .1s;}
  .card:active{transform:scale(.99);}
  .card .name{font-size:15px; font-weight:600;}
  .card .addr{font-size:12px; color:var(--text2); margin-top:2px;}
  .pill{border-radius:999px; padding:4px 10px; font-size:11px; font-weight:600; white-space:nowrap; display:inline-flex; align-items:center; gap:4px;}
  .empty{display:flex; flex-direction:column; align-items:center; padding:48px 0; color:var(--text3); gap:8px; font-size:13px;}
  /* task */
  .task{display:flex; align-items:center; gap:11px; border-radius:var(--r-md); padding:12px; margin-bottom:8px; cursor:pointer;}
  .task .lbl{font-size:14px; color:var(--text);}
  .task .qty{font-size:11px; color:var(--text2); margin-top:1px;}
  .task .st{font-size:11px; font-weight:600;}
  .strike{text-decoration:line-through;}
  .task-del{margin-left:6px; background:transparent; border:0; cursor:pointer; padding:4px; display:flex; border-radius:8px; transition:transform .1s;}
  .task-del:active{transform:scale(.85);}
  .add-task{display:flex; align-items:center; gap:8px; margin-top:4px;}
  .add-task input{flex:1; height:48px; border:1.5px dashed var(--border2); border-radius:var(--r-md); background:transparent; padding:0 14px; font-size:14px; color:var(--text); font-family:inherit; outline:0; transition:border-color .15s;}
  .add-task input::placeholder{color:var(--text3);}
  .add-task input:focus{border-color:var(--pine); border-style:solid;}
  .add-task .add-btn{width:48px; height:48px; flex:none; border-radius:var(--r-md); background:var(--pine); color:#fff; border:0; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(31,93,67,.28);}
  /* generic */
  .btn-primary{height:52px; border-radius:var(--r-md); background:var(--pine); color:#fff; font-size:16px; font-weight:600; border:0; width:100%; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 16px rgba(31,93,67,.28); transition:transform .1s;}
  .btn-clay{height:50px; border-radius:var(--r-md); background:var(--clay); color:#fff; font-size:15px; font-weight:600; border:0; width:100%; cursor:pointer; box-shadow:0 6px 16px rgba(194,86,47,.28); transition:transform .1s;}
  .btn-primary:active,.btn-clay:active{transform:scale(.985);}
  .field{display:flex; align-items:center; gap:10px; border:1px solid var(--border); border-radius:var(--r-md); padding:0 13px; height:52px; background:var(--surface); margin-bottom:10px;}
  .field input{flex:1; border:0; outline:0; background:transparent; font-size:15px; color:var(--text); font-family:inherit;}
  .field input::placeholder{color:var(--text3);}
  .field{transition:border-color .15s, box-shadow .15s;}
  .field:focus-within{border-color:var(--pine); box-shadow:0 0 0 3px rgba(31,93,67,.12);}
  .link{color:var(--pine); font-size:14px; font-weight:600; cursor:pointer;}
  .center{display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
  .presta-wrap{border:1px solid var(--border); border-radius:var(--r-md); margin-bottom:7px; overflow:hidden;}
  .presta-wrap.on{background:var(--surface2); border-color:var(--border2);}
  .presta-head{display:flex; align-items:center; gap:11px; padding:11px; cursor:pointer;}
  .presta-head .pl{font-size:14px; color:var(--text2);}
  .presta-wrap.on .presta-head .pl{color:var(--text);}
  .presta-detail{padding:0 11px 11px 44px;}
  .presta-detail .opt{font-size:11px; color:var(--text3); margin:0 0 5px 2px;}
  .presta-detail input{width:100%; height:40px; border:1px solid var(--border2); border-radius:var(--r-sm); background:var(--surface); padding:0 11px; font-size:13px; color:var(--text); font-family:inherit; outline:0;}
  .presta-detail input::placeholder{color:var(--text3);}
  .set-row{display:flex; align-items:center; gap:12px; padding:14px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md); margin-bottom:8px;}
  .set-row .sl{flex:1; font-size:14px;}
  /* tab bar */
  .tabbar{background:var(--surface); border-top:1px solid var(--border); display:none; box-shadow:0 -3px 14px rgba(0,0,0,.06);}
  .tabbar.show{display:block;}
  .tabs{display:flex; height:64px; align-items:flex-start;}
  .tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding-top:8px; cursor:pointer; color:var(--text2); font-size:11px; font-weight:500; background:none; border:0; font-family:inherit;}
  .tab.active{color:var(--pine);}
  .tab .tab-ic{width:48px; height:30px; border-radius:15px; display:flex; align-items:center; justify-content:center; transition:background .15s;}
  .tab.active .tab-ic{background:var(--pineLight);}
  .fab-slot{width:72px; position:relative; display:flex; flex-direction:column; align-items:center;}
  .fab{position:absolute; top:-24px; width:62px; height:62px; border-radius:31px; background:var(--clay); display:flex; align-items:center; justify-content:center; cursor:pointer; border:4px solid var(--surface); box-shadow:0 8px 18px rgba(194,86,47,.45); transition:transform .1s;}
  .fab:active{transform:scale(.94);}
  .fab-lbl{font-size:11px; color:var(--text2); font-weight:500; margin-top:44px;}
  /* modal */
  .modal{position:absolute; inset:0; background:var(--bg); display:none; flex-direction:column; z-index:20;}
  .modal.show{display:flex;}
  .modal .scroll{padding:0;}
  .voice{height:58px; border-radius:var(--r-lg); background:var(--pineLight); display:flex; align-items:center; justify-content:center; gap:10px; color:var(--pineDark); font-size:15px; font-weight:600; cursor:pointer; margin-bottom:8px;}
  .brand-badge{width:64px;height:64px;border-radius:var(--r-lg);background:var(--pine);display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
  /* grille agenda (planning semaine) */
  .grid-wrap{overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -18px; padding:2px 18px 10px;}
  .grid{display:grid; grid-template-columns:68px repeat(7, 92px); gap:6px; min-width:max-content;}
  .gh{text-align:center; padding:7px 0; border-radius:12px;}
  .gh .wd{font-size:10px; letter-spacing:.5px; color:var(--text3); font-weight:700;}
  .gh .dn{font-size:16px; font-weight:700; color:var(--text); margin-top:1px;}
  .gh.today{background:var(--pine);}
  .gh.today .wd,.gh.today .dn{color:#fff;}
  .glabel{display:flex; flex-direction:column; justify-content:center; padding:0 2px;}
  .glabel b{font-size:13px; color:var(--text); font-weight:600;}
  .glabel span{font-size:10px; color:var(--text3); margin-top:2px;}
  .gcell{min-height:76px; border:1px solid var(--border); border-radius:14px; background:var(--surface); display:flex; flex-direction:column; gap:5px; padding:6px;}
  .gcell.empty{border:0; background:repeating-linear-gradient(45deg,#e6ecdd,#e6ecdd 5px,#f1f5ec 5px,#f1f5ec 11px); align-items:center; justify-content:center; cursor:pointer;}
  .gcell.empty .plus{color:var(--text3); font-size:22px; font-weight:300; line-height:1;}
  .gchip{border-radius:10px; padding:6px 8px; font-size:12px; font-weight:600; display:flex; align-items:center; gap:5px; cursor:grab; border:1.5px solid; line-height:1.1; transition:transform .1s; touch-action:none; user-select:none;}
  .gchip:active{transform:scale(.96);}
  .gchip .gdot{width:7px; height:7px; border-radius:4px; flex:none;}
  .gchip .gname{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  /* interrupteurs, unités, plans */
  .switch{width:42px; height:24px; border-radius:999px; background:var(--border2); position:relative; cursor:pointer; transition:background .15s; flex:none;}
  .switch.on{background:var(--pine);}
  .switch .knob{position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:9px; background:#fff; transition:left .15s; box-shadow:0 1px 2px rgba(0,0,0,.2);}
  .switch.on .knob{left:21px;}
  .unit-chip{font-size:11px; color:var(--text2); background:var(--surface2); border-radius:999px; padding:2px 9px; font-weight:600;}
  .sub-head{display:flex; align-items:center; gap:8px; padding-bottom:10px;}
  .plan{border:1px solid var(--border); border-radius:var(--r-lg); padding:15px; margin-bottom:10px; background:var(--surface);}
  .plan.cur{border:2px solid var(--pine);}
  .plan .pname{font-size:16px; font-weight:700;}
  .plan .pprice{font-size:15px; font-weight:700; color:var(--pine);}
  .plan .pdesc{font-size:12px; color:var(--text2); margin-top:4px;}
  .plan .pbadge{font-size:11px; font-weight:700; color:var(--pineDark); background:var(--pineLight); border-radius:999px; padding:3px 10px;}
  .plan .pbtn{margin-top:11px; height:40px; border-radius:var(--r-md); border:1px solid var(--pine); background:transparent; color:var(--pine); font-weight:600; font-size:13px; width:100%; cursor:pointer; font-family:inherit;}
  /* glisser-déposer + confirmation */
  .gcell.drop{outline:2px dashed var(--pine); outline-offset:-2px; background:var(--pineLight);}
  .confirm{position:absolute; inset:0; background:rgba(20,20,18,.4); display:none; align-items:flex-end; z-index:40;}
  .confirm.show{display:flex;}
  .confirm .sheet{background:var(--surface); width:100%; border-top-left-radius:20px; border-top-right-radius:20px; padding:18px 18px 22px; box-shadow:0 -8px 30px rgba(0,0,0,.22);}
  .cf-cancel{flex:1; height:46px; border-radius:var(--r-md); border:1px solid var(--border2); background:transparent; color:var(--text2); font-weight:600; font-size:14px; cursor:pointer; font-family:inherit;}
  .cf-ok{flex:1; height:46px; border-radius:var(--r-md); border:0; background:var(--pine); color:#fff; font-weight:600; font-size:14px; cursor:pointer; font-family:inherit;}
  /* barre de défilement soignée */
  .scroll{scrollbar-width:thin; scrollbar-color:#c2cfb6 transparent;}
  .scroll::-webkit-scrollbar{width:7px;}
  .scroll::-webkit-scrollbar-track{background:transparent;}
  .scroll::-webkit-scrollbar-thumb{background:#c8d3bd; border-radius:8px; border:2px solid transparent; background-clip:padding-box;}
  .scroll::-webkit-scrollbar-thumb:hover{background:#b2c2a1;}
  .grid-wrap::-webkit-scrollbar{height:8px;}
  .grid-wrap::-webkit-scrollbar-thumb{background:#c8d3bd; border-radius:8px;}
  /* bandeau de filtres roulant */
  .filters{display:flex; gap:8px; overflow-x:auto; margin:0 -18px 12px; padding:2px 18px 6px; scrollbar-width:none;}
  .filters::-webkit-scrollbar{display:none;}
  .fchip{flex:none; padding:7px 14px; border-radius:999px; border:1px solid var(--border2); background:var(--surface); font-size:13px; font-weight:600; color:var(--text2); cursor:pointer; white-space:nowrap; transition:all .12s;}
  .fchip.on{background:var(--pine); border-color:var(--pine); color:#fff;}
  /* rapport de chantier */
  .pbar{height:8px; border-radius:999px; background:var(--surface2); overflow:hidden;}
  .pbar>span{display:block; height:100%; background:var(--pine); border-radius:999px;}
  .rep-head{background:var(--pine); color:#fff; border-radius:var(--r-lg); padding:16px; margin-bottom:16px;}
  .rep-photos{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .rep-photo{aspect-ratio:4/3; border:1.5px dashed var(--border2); border-radius:var(--r-md); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; color:var(--text3); font-size:12px; font-weight:600; background:var(--surface);}
  .rep-btn{height:50px; border-radius:var(--r-md); border:0; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:8px;}
</style>
</head>
<body>
  <div class="phone">
    <div class="ubanner" id="ubanner"></div>
    <div class="scroll" id="app"></div>
    <nav class="tabbar" id="tabbar"></nav>

    <!-- modal création -->
    <div class="modal" id="modal">
      <div class="scroll" id="modal-body"></div>
    </div>

    <!-- feuille de confirmation -->
    <div class="confirm" id="confirm"></div>
  </div>

<script>
/* ----- tokens ----- */
var STATUS = {
  todo:{fg:'#9c6f1e',bg:'#f6edda',label:'À venir',icon:'clock'},
  soon:{fg:'#2f6da8',bg:'#e3eef9',label:'En cours',icon:'progress'},
  done:{fg:'#2e7d32',bg:'#e4f1e4',label:'Terminé',icon:'checkc'},
  late:{fg:'#b23b2e',bg:'#f7e4e0',label:'Annulé',icon:'x'}
};
var STATUS_KEY = {planifie:'todo', en_cours:'soon', termine:'done', annule:'late'};

/* ----- icons (style trait) ----- */
var I = {
  calendar:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',
  mic:'<rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 19v3M8 22h8"/>',
  leaf:'<path d="M4 20c0-9 7-16 16-16 0 9-7 16-16 16Z"/><path d="M4 20c2-6 6-10 12-12"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
  user:'<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/>',
  map:'<path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2Z"/><path d="M9 4v14M15 6v14"/>',
  clip:'<rect x="6" y="4" width="12" height="18" rx="2"/><path d="M9 4a3 3 0 0 1 6 0M9 11h6M9 15h6"/>',
  back:'<path d="M19 12H5M12 19l-7-7 7-7"/>',
  x:'<path d="M18 6 6 18M6 6l12 12"/>',
  chev:'<path d="m9 6 6 6-6 6"/>',
  eye:'<path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>',
  eyeoff:'<path d="M3 12s4-7 9-7c1 0 2 .2 3 .5M21 12s-4 7-9 7c-1 0-2-.2-3-.5"/><path d="M9.5 9.5a3 3 0 0 0 4.2 4.2M2 2l20 20"/>',
  mail:'<rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/>',
  lock:'<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>',
  pin:'<path d="M12 21s7-6 7-11a7 7 0 0 0-14 0c0 5 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/>',
  logout:'<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>',
  bell:'<path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/>',
  card:'<rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/>',
  checkc:'<circle cx="12" cy="12" r="9"/><path d="m8.5 12.5 2.5 2.5 4.5-5"/>',
  circle:'<circle cx="12" cy="12" r="9"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  checkbox:'<rect x="3" y="3" width="18" height="18" rx="3"/><path d="m8 12 3 3 5-6"/>',
  square:'<rect x="3" y="3" width="18" height="18" rx="3"/>',
  calblank:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',
  progress:'<path d="M12 3a9 9 0 1 0 9 9"/>',
  download:'<path d="M12 3v12M7 11l5 5 5-5M5 21h14"/>',
  send:'<path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/>',
  image:'<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/>',
  archive:'<rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8M10 12h4"/>',
  filter:'<path d="M3 5h18M6 12h12M10 19h4"/>'
};
function icon(name, size, color){
  size = size||22; color = color||'currentColor';
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(I[name]||'')+'</svg>';
}

/* ----- données fictives (calquées sur le mock de l'app) ----- */
var WEEK = [{d:15,wd:'lun'},{d:16,wd:'mar'},{d:17,wd:'mer'},{d:18,wd:'jeu'},{d:19,wd:'ven'},{d:20,wd:'sam'},{d:21,wd:'dim'}];
var WD_FULL = {lun:'Lundi',mar:'Mardi',mer:'Mercredi',jeu:'Jeudi',ven:'Vendredi',sam:'Samedi',dim:'Dimanche'};
var DAYS_WITH = [16,17,18,19];
var CH = {
  16:[{id:'c-petit',name:'Mme Petit',addr:'Gastes · entretien',status:'termine',time:'15:00'}],
  17:[
    {id:'c-martin',name:'Mme Martin',addr:'Biscarrosse · entretien',status:'en_cours',time:'09:00'},
    {id:'c-dupont',name:'M. Dupont',addr:'Parentis · taille',status:'planifie',time:'11:00'},
    {id:'c-pins',name:'Copro Les Pins',addr:'Biscarrosse · entretien',status:'planifie',time:'14:00'}
  ],
  18:[
    {id:'c-martin2',name:'Mme Martin',addr:'Taille des lauriers (reportée)',status:'planifie',time:'08:30'},
    {id:'c-bernard',name:'M. Bernard',addr:'Sanguinet · débroussaillage',status:'planifie',time:'10:00'}
  ],
  19:[{id:'c-roux',name:'M. Roux',addr:'Biscarrosse · devis clôture',status:'planifie',time:'14:00'}]
};

/* ----- bandeau mise à jour -----
   Le bandeau ne s'affiche QUE si une version plus récente est en ligne
   (version.json déployé à côté). Vérif au chargement + toutes les 60 s,
   donc un onglet déjà ouvert détecte la nouvelle version automatiquement.
   "Mettre à jour" recharge en contournant le cache -> dernière version. */
var APP_VERSION='0.9';
function showBanner(newV){
  var b=document.getElementById('ubanner'); if(!b) return;
  b.style.display='flex';
  b.innerHTML='<span style="display:flex">'+icon('download',18,'#fff')+'</span>'+
    '<div class="ub-txt"><b>Mise à jour disponible</b><span>Nouvelles améliorations — v'+newV+'</span></div>'+
    '<button class="ub-btn" onclick="updateApp()">Mettre à jour</button>'+
    '<button class="ub-x" aria-label="Plus tard" onclick="dismissBanner(\''+newV+'\')">'+icon('x',16,'rgba(255,255,255,.85)')+'</button>';
}
function checkUpdate(){
  var b=document.getElementById('ubanner'); if(!b) return;
  fetch('version.json?t='+Date.now()).then(function(r){return r.json();}).then(function(v){
    if(!v||!v.version) return;
    var skip=''; try{ skip=sessionStorage.getItem('gp_skip')||''; }catch(e){}
    if(v.version!==APP_VERSION && skip!==v.version){ showBanner(v.version); }
    else { b.style.display='none'; }
  }).catch(function(){ /* fichier local / hors-ligne : pas de bandeau */ });
}
function renderBanner(){ var b=document.getElementById('ubanner'); if(b) b.style.display='none'; checkUpdate(); setInterval(checkUpdate, 60000); }
function updateApp(){ location.replace(location.pathname+'?v='+Date.now()); }
function dismissBanner(v){ try{ sessionStorage.setItem('gp_skip',v||''); }catch(e){} var b=document.getElementById('ubanner'); if(b) b.style.display='none'; }
function openCreate(){ document.getElementById('modal').classList.add('show'); renderModal(); }
function closeCreate(){ document.getElementById('modal').classList.remove('show'); }

/* ----- glisser-déposer un chantier (doigt + souris) ----- */
function cellAt(x,y){ var el=document.elementFromPoint(x,y); return el?el.closest('.gcell'):null; }
function clearHighlight(){ var p=document.querySelector('.gcell.drop'); if(p) p.classList.remove('drop'); }
function chipDown(e, id, day){
  e.preventDefault();
  var chip=e.currentTarget, sx=e.clientX, sy=e.clientY, moved=false, ghost=null;
  function move(ev){
    if(!moved && (Math.abs(ev.clientX-sx)+Math.abs(ev.clientY-sy))>8){
      moved=true;
      ghost=chip.cloneNode(true);
      Object.assign(ghost.style,{position:'fixed',pointerEvents:'none',zIndex:'90',opacity:'.92',margin:'0',width:chip.offsetWidth+'px',boxShadow:'0 10px 22px rgba(0,0,0,.28)'});
      document.body.appendChild(ghost); chip.style.opacity='.35'; document.body.style.userSelect='none';
    }
    if(moved){ ev.preventDefault(); ghost.style.left=(ev.clientX-ghost.offsetWidth/2)+'px'; ghost.style.top=(ev.clientY-18)+'px'; clearHighlight(); var c=cellAt(ev.clientX,ev.clientY); if(c) c.classList.add('drop'); }
  }
  function up(ev){
    document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up);
    document.body.style.userSelect=''; clearHighlight();
    if(!moved){ openChantier(id); return; }
    if(ghost) ghost.remove(); chip.style.opacity='';
    var cell=cellAt(ev.clientX,ev.clientY);
    if(cell){ var toDay=parseInt(cell.getAttribute('data-day'),10), toBand=cell.getAttribute('data-band'); var ch=chantierById(id);
      if(ch && toDay && (toDay!==day || bandOf(ch.time)!==toBand)){ askMove(id, day, toDay, toBand); } }
  }
  document.addEventListener('pointermove',move,{passive:false});
  document.addEventListener('pointerup',up);
}
function dayLabel(d){ for(var i=0;i<WEEK.length;i++){ if(WEEK[i].d===d) return WD_FULL[WEEK[i].wd]+' '+d; } return ''+d; }
function bandLabel(k){ for(var i=0;i<BANDS.length;i++){ if(BANDS[i].key===k) return BANDS[i].label; } return k; }
function bandTime(k){ return k==='matin'?'09:00':(k==='aprem'?'14:00':'18:00'); }
function askMove(id, fromDay, toDay, toBand){
  var ch=chantierById(id); if(!ch) return;
  var from=dayLabel(fromDay)+' · '+bandLabel(bandOf(ch.time));
  var to=dayLabel(toDay)+' · '+bandLabel(toBand);
  showConfirm('Déplacer le chantier ?', '<b>'+ch.name+'</b><br><span style="color:var(--text3)">'+from+'</span> &nbsp;→&nbsp; <b style="color:var(--pine)">'+to+'</b>', 'Déplacer', function(){ moveChantier(id, fromDay, toDay, toBand); });
}
function moveChantier(id, fromDay, toDay, toBand){
  var ch=chantierById(id); if(!ch) return;
  if(CH[fromDay]) CH[fromDay]=CH[fromDay].filter(function(c){return c.id!==id;});
  ch.time=bandTime(toBand);
  if(!CH[toDay]) CH[toDay]=[];
  CH[toDay].push(ch);
  DAYS_WITH=Object.keys(CH).filter(function(k){return CH[k]&&CH[k].length;}).map(Number);
  render();
}

  }).join(''):'<div class="empty">'+icon('calblank',28,'var(--text3)')+'<div>Aucun chantier ce jour</div></div>';
  return '<div class="pad">'+
    '<div class="row" style="gap:8px;padding-bottom:10px;"><div class="icon-btn" style="border:0;width:34px;height:34px;background:transparent" onclick="go(\'agenda\')">'+icon('back',24,'var(--text)')+'</div><div><div class="h-sub">Vue mois</div><div style="font-size:20px;font-weight:600;">Juin 2026</div></div></div>'+
    grid+
    '<div class="muted" style="margin:18px 0 10px;">'+label+'</div>'+
    list+'</div>';
}

function viewChantiers(){
  var f=state.filter||'tous';
  var FILTERS=[{k:'tous',l:'Tous'},{k:'planifie',l:'À venir'},{k:'en_cours',l:'En cours'},{k:'termine',l:'Terminé'},{k:'archives',l:'Archivés'}];
  var bar='<div class="filters">'+FILTERS.map(function(x){return '<button class="fchip'+(f===x.k?' on':'')+'" onclick="setFilter(\''+x.k+'\')">'+x.l+'</button>';}).join('')+'</div>';
  var all=allChantiers();
  var list=(f==='archives')?all.filter(function(c){return state.archived[c.id];})
          :all.filter(function(c){return !state.archived[c.id] && (f==='tous'||c.status===f);});
  var rows=list.length?list.map(function(c){
    var arch=!!state.archived[c.id];
    var action=arch?'openRapport(\''+c.id+'\',\'chantiers\')':'openChantier(\''+c.id+'\')';
    var right=arch?'<span class="pill" style="background:var(--surface2);color:var(--text2)">'+icon('clip',12,'var(--text2)')+'<span>Rapport</span></span>':statusPill(c.status);
    return '<div class="card" style="border-left-color:'+STATUS[STATUS_KEY[c.status]].fg+';margin-bottom:9px;border-top-left-radius:var(--r-md);border-bottom-left-radius:var(--r-md);" onclick="'+action+'">'+
      '<div style="flex:1"><div class="name">'+c.name+'</div><div class="addr">'+c.addr+'</div></div>'+right+'</div>';
  }).join(''):'<div class="empty">'+icon(f==='archives'?'archive':'clip',30,'var(--text3)')+'<div>'+(f==='archives'?'Aucun chantier archivé':'Aucun chantier')+'</div></div>';
  return '<div class="pad"><div class="h-title" style="margin-bottom:12px;">Mes chantiers</div>'+bar+rows+'</div>';
}

function viewRapport(){
  var c=chantierById(state.chantier)||{name:'Chantier',addr:'',status:'planifie'};
  var ts=tasksFor(state.chantier);
  var done=ts.filter(function(t){return t.status==='fait';}).length;
  var pct=ts.length?Math.round(done/ts.length*100):0;
  var taskList=ts.map(function(t){
    var fait=t.status==='fait', col=fait?STATUS.done.fg:(t.status==='reporte'?STATUS.todo.fg:'var(--text3)');
    return '<div class="row" style="gap:9px;padding:8px 0;border-bottom:1px solid var(--border);">'+icon(fait?'checkc':(t.status==='reporte'?'clock':'circle'),18,col)+'<span style="flex:1;font-size:14px;color:var(--text)">'+t.label+'</span>'+(t.unit?'<span style="font-size:12px;color:var(--text2)">'+(t.qty!==''&&t.qty!=null?t.qty+' ':'')+t.unit+'</span>':'')+'</div>';
  }).join('');
  return '<div class="pad">'+
    '<div class="sub-head"><div class="icon-btn" style="border:0;width:34px;height:34px;background:transparent;box-shadow:none" onclick="go(\''+(state.rapportBack||'chantiers')+'\')">'+icon('back',24,'var(--text)')+'</div><div style="font-size:18px;font-weight:700;">Rapport de chantier</div></div>'+
    '<div class="rep-head"><div style="font-size:18px;font-weight:700;">'+c.name+'</div><div style="font-size:13px;opacity:.92;margin-top:2px;">'+c.addr+'</div><div style="font-size:12px;opacity:.82;margin-top:8px;">Intervention du 17 juin 2026 · GreenPilot</div></div>'+
    '<div class="row between" style="margin-bottom:8px;"><div class="muted">Prestations réalisées</div><div style="font-size:12px;color:var(--text2);">'+done+' / '+ts.length+'</div></div>'+
    '<div class="pbar" style="margin-bottom:14px;"><span style="width:'+pct+'%"></span></div>'+
    taskList+
    '<div class="muted" style="margin:18px 0 9px;">Photos avant / après</div>'+
    '<div class="rep-photos"><div class="rep-photo">'+icon('image',26,'var(--text3)')+'Avant</div><div class="rep-photo">'+icon('image',26,'var(--text3)')+'Après</div></div>'+
    '<div style="display:flex;flex-direction:column;gap:10px;margin-top:18px;">'+
      '<button class="rep-btn" style="background:var(--pine);color:#fff" onclick="alert(\'Rapport envoyé au client (démo) — par e-mail ou SMS.\')">'+icon('send',18,'#fff')+'Envoyer au client</button>'+
      '<button class="rep-btn" style="background:var(--surface2);color:var(--text2)" onclick="alert(\'Téléchargement PDF — bientôt.\')">'+icon('download',18,'var(--text2)')+'Télécharger en PDF</button>'+
      (state.archived[c.id]?'<button class="rep-btn" style="background:transparent;color:var(--clayDark);height:42px" onclick="unarchive(\''+c.id+'\')">'+icon('archive',18,'var(--clayDark)')+'Sortir des archives</button>':'')+
    '</div>'+
    '</div>';
}

function viewCarte(){
  var towns=[
    {name:'Biscarrosse',x:63,y:283,c:'#2f6da8'},
    {name:'Sanguinet',x:98,y:238,c:'#9c6f1e'},
    {name:'Parentis',x:98,y:304,c:'#9c6f1e'},
    {name:'Gastes',x:66,y:324,c:'#2e7d32'}
  ];
  var refs=[{name:'Arcachon',x:59,y:147,a:'start'},{name:'Bordeaux',x:289,y:56,a:'end'},{name:'Mimizan',x:35,y:382,a:'start'}];
  var refDots=refs.map(function(r){
    var tx=r.a==='end'?r.x-7:r.x+7, anc=r.a==='end'?'end':'start';
    return '<circle cx="'+r.x+'" cy="'+r.y+'" r="3" fill="#9c9a8e"/><text x="'+tx+'" y="'+(r.y+3)+'" font-size="10" text-anchor="'+anc+'" fill="#9c9a8e">'+r.name+'</text>';
  }).join('');
  var pins=towns.map(function(t){
    return '<circle cx="'+t.x+'" cy="'+t.y+'" r="6.5" fill="'+t.c+'" stroke="#fff" stroke-width="2"/>'+
      '<text x="'+(t.x+11)+'" y="'+(t.y+4)+'" font-size="11.5" font-weight="600" fill="#23241f">'+t.name+'</text>';
  }).join('');
  var svg='<svg viewBox="0 0 340 430" width="100%" style="display:block;border-radius:var(--r-lg);border:1px solid var(--border);background:#eaeee2;">'+
    '<path d="M0,0 L52,0 C46,90 60,150 50,210 C42,270 58,340 46,430 L0,430 Z" fill="#cfe3ec"/>'+
    '<ellipse cx="80" cy="250" rx="20" ry="30" fill="#bcd7e3"/>'+
    '<ellipse cx="84" cy="312" rx="19" ry="20" fill="#bcd7e3"/>'+
    '<path d="M50,182 C120,172 220,196 340,180" fill="none" stroke="#b9a98b" stroke-width="1.5" stroke-dasharray="5 4"/>'+
    '<text x="138" y="92" font-size="12" font-weight="700" fill="#b3a684" letter-spacing="1">GIRONDE (33)</text>'+
    '<text x="150" y="248" font-size="12" font-weight="700" fill="#b3a684" letter-spacing="1">LANDES (40)</text>'+
    '<text x="13" y="120" font-size="10" fill="#7fa9bd" transform="rotate(-90 13,120)">Océan Atlantique</text>'+
    refDots+pins+
    '</svg>';
  var legend='<div class="row" style="gap:14px;justify-content:center;margin:10px 0 4px;font-size:11px;color:var(--text2);">'+
    '<span class="row" style="gap:5px"><span style="width:9px;height:9px;border-radius:5px;background:#2f6da8"></span>En cours</span>'+
    '<span class="row" style="gap:5px"><span style="width:9px;height:9px;border-radius:5px;background:#9c6f1e"></span>À venir</span>'+
    '<span class="row" style="gap:5px"><span style="width:9px;height:9px;border-radius:5px;background:#2e7d32"></span>Terminé</span></div>';
  var all=[]; for(var k in CH){ CH[k].forEach(function(c){ all.push(c); }); }
  var list=all.map(function(c){
    return '<div class="card" style="border-left-color:'+STATUS[STATUS_KEY[c.status]].fg+';margin-bottom:9px;border-top-left-radius:var(--r-md);border-bottom-left-radius:var(--r-md);" onclick="openChantier(\''+c.id+'\')"><div style="flex:1"><div class="name">'+c.name+'</div><div class="addr">'+c.addr+'</div></div>'+statusPill(c.status)+'</div>';
  }).join('');
  return '<div class="pad">'+
    '<div class="h-sub">Votre secteur</div><div class="h-title" style="margin-bottom:12px;">Carte — Landes &amp; Gironde</div>'+
    svg+legend+
    '<div class="muted" style="margin:16px 0 10px;">Chantiers sur la zone</div>'+list+
    '</div>';
}

function viewProfil(){
  return '<div class="pad">'+
    '<div class="h-title" style="margin-bottom:8px;">Profil</div>'+
    '<div class="set-row" style="gap:14px;padding:16px;border-radius:var(--r-lg);">'+
      '<div style="width:52px;height:52px;border-radius:999px;background:var(--pineLight);display:flex;align-items:center;justify-content:center;">'+icon('user',28,'var(--pineDark)')+'</div>'+
      '<div style="flex:1"><div style="font-size:16px;font-weight:600;">Entreprise Arthur</div><div style="font-size:13px;color:var(--text2);margin-top:2px;">Arthur</div><div style="font-size:12px;color:var(--text3);">arthur@demo.fr</div></div></div>'+
    '<div class="muted" style="margin:22px 0 9px 2px;">Réglages</div>'+
    setRow('clip','Mes prestations','prestations')+setRow('card','Abonnement','abonnement')+setRow('bell','Rappels','rappels')+
    '<button class="set-row" style="justify-content:center;gap:8px;border-color:var(--border2);cursor:pointer;width:100%;margin-top:16px;font-family:inherit;" onclick="logout()">'+icon('logout',19,'var(--clayDark)')+'<span style="color:var(--clayDark);font-size:15px;font-weight:600;">Se déconnecter</span></button>'+
    '</div>';
}
function setRow(ic,label,screen){ return '<div class="set-row" style="cursor:pointer" onclick="go(\''+screen+'\')">'+icon(ic,20,'var(--text2)')+'<span class="sl">'+label+'</span>'+icon('chev',20,'var(--text3)')+'</div>'; }
function subHead(title){ return '<div class="sub-head"><div class="icon-btn" style="border:0;width:34px;height:34px;background:transparent;box-shadow:none" onclick="go(\'profil\')">'+icon('back',24,'var(--text)')+'</div><div style="font-size:18px;font-weight:700;">'+title+'</div></div>'; }

function viewPrestations(){
  var rows=PRESTATIONS.map(function(p,i){
    return '<div class="set-row" style="cursor:default"><span class="sl">'+p.n+'</span><span class="unit-chip">'+p.u+'</span><div class="switch'+(p.on?' on':'')+'" onclick="togglePresence('+i+')"><div class="knob"></div></div></div>';
  }).join('');
  return '<div class="pad">'+subHead('Mes prestations')+
    '<div style="font-size:13px;color:var(--text2);margin-bottom:12px;">Active les prestations que tu proposes. L’unité sert au chiffrage.</div>'+
    rows+
    '<div class="add-task" style="margin-top:6px;"><input id="newpresta" placeholder="Ajouter une prestation…" onkeydown="if(event.key===\'Enter\')addPrestation()"/><button class="add-btn" aria-label="Ajouter" onclick="addPrestation()">'+icon('plus',22,'#fff')+'</button></div>'+
    '</div>';
}
function togglePresence(i){ PRESTATIONS[i].on=!PRESTATIONS[i].on; render(); }
function addPrestation(){ var inp=document.getElementById('newpresta'); if(!inp) return; var v=(inp.value||'').trim(); if(!v) return; PRESTATIONS.push({n:v,u:'forfait',on:true}); render(); var n=document.getElementById('newpresta'); if(n) n.focus(); }

function viewAbonnement(){
  var cards=PLANS.map(function(p){
    return '<div class="plan'+(p.cur?' cur':'')+'">'+
      '<div class="row between"><div class="pname">'+p.n+'</div>'+(p.cur?'<span class="pbadge">Plan actuel</span>':'<span class="pprice">'+p.p+'</span>')+'</div>'+
      (p.cur?'<div class="pprice" style="margin-top:3px">'+p.p+'</div>':'')+
      '<div class="pdesc">'+p.d+'</div>'+
      (p.cur?'':'<button class="pbtn" onclick="alert(\'Changement de plan — bientôt.\')">Passer à '+p.n+'</button>')+
      '</div>';
  }).join('');
  return '<div class="pad">'+subHead('Abonnement')+
    '<div style="font-size:13px;color:var(--text2);margin-bottom:12px;">Prix transparent, sans engagement.</div>'+cards+'</div>';
}

function viewRappels(){
  var rows=REMINDERS.map(function(r,i){
    return '<div class="set-row" style="cursor:default;align-items:flex-start"><div style="flex:1"><div class="sl" style="font-weight:600">'+r.n+'</div><div style="font-size:12px;color:var(--text2);margin-top:2px">'+r.d+'</div></div><div class="switch'+(r.on?' on':'')+'" onclick="toggleReminder('+i+')"><div class="knob"></div></div></div>';
  }).join('');
  return '<div class="pad">'+subHead('Rappels')+
    '<div style="font-size:13px;color:var(--text2);margin-bottom:12px;">GreenPilot te prévient au bon moment — tu gardes la main.</div>'+rows+'</div>';
}
function toggleReminder(i){ REMINDERS[i].on=!REMINDERS[i].on; render(); }

function renderModal(){
  var body='<div class="pad">'+
    '<div class="row" style="gap:8px;padding-top:2px;"><div class="icon-btn" style="border:0;width:34px;height:34px;background:transparent" onclick="closeCreate()">'+icon('x',24,'var(--text)')+'</div><div style="font-size:20px;font-weight:600;">Créer un chantier</div></div>'+
    '<div style="height:14px"></div>'+
    '<div class="voice">'+icon('mic',23,'var(--pineDark)')+'Dicter le chantier</div>'+
    '<div style="text-align:center;color:var(--text3);font-size:12px;margin-bottom:16px;">ou remplir manuellement</div>'+
    '<div class="field">'+icon('user',19,'var(--text3)')+'<input placeholder="Client"/></div>'+
    '<div class="field">'+icon('pin',19,'var(--text3)')+'<input placeholder="Adresse"/></div>'+
    '<div class="muted" style="margin:10px 0 9px;">Prestations</div>'+
    state.presta.map(function(p,i){
      var head='<div class="presta-head" onclick="togglePresta('+i+')">'+icon(p.on?'checkbox':'square',22,p.on?STATUS.done.fg:'var(--text3)')+'<span class="pl">'+p.n+'</span></div>';
      var detail = p.on ? '<div class="presta-detail"><div class="opt">Détail (facultatif)</div><input inputmode="numeric" placeholder="'+p.hint+'" value="'+(p.detail||'').replace(/"/g,'&quot;')+'" oninput="setDetail('+i+',this.value)"/></div>' : '';
      return '<div class="presta-wrap'+(p.on?' on':'')+'">'+head+detail+'</div>';
    }).join('')+
    '<button class="btn-clay" style="margin-top:14px" onclick="closeCreate()">Créer le chantier</button>'+
    '</div>';
  document.getElementById('modal-body').innerHTML=body;
}

function renderTabbar(){
  var tb=document.getElementById('tabbar');
  if(TAB_SCREENS.indexOf(state.screen)===-1){ tb.classList.remove('show'); tb.innerHTML=''; return; }
  tb.classList.add('show');
  var defs=[['agenda','calendar','Agenda'],['chantiers','clip','Mes chantiers']];
  var right=[['carte','map','Carte'],['profil','user','Profil']];
  function tab(t){ var act=state.screen===t[0]; return '<button class="tab'+(act?' active':'')+'" onclick="go(\''+t[0]+'\')"><span class="tab-ic">'+icon(t[1],22,act?'var(--pine)':'var(--text2)')+'</span><span>'+t[2]+'</span></button>'; }
  tb.innerHTML='<div class="tabs">'+defs.map(tab).join('')+
    '<div class="fab-slot"><div class="fab" onclick="openCreate()">'+icon('plus',30,'#fff')+'</div><div class="fab-lbl">Créer</div></div>'+
    right.map(tab).join('')+'</div>';
}

var VIEWS={connexion:viewConnexion,inscription:viewInscription,agenda:viewAgenda,mois:viewMois,fiche:viewFiche,chantiers:viewChantiers,carte:viewCarte,profil:viewProfil,prestations:viewPrestations,abonnement:viewAbonnement,rappels:viewRappels,rapport:viewRapport};
function render(){
  document.getElementById('app').innerHTML='<div class="screen active">'+(VIEWS[state.screen]||viewAgenda)()+'</div>';
  renderTabbar();
}
render();
renderBanner();
</script>
</body>
</html>
